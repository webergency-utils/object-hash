name: Fuzzing

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 0'

permissions: read-all

jobs:
  fuzz:
    name: Jazzer.js Fuzzing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx tsup

      - name: Run fuzzer
        run: npx jazzer fuzz_hash.cjs --sync -- -runs=10000 -max_total_time=300
